spring.application.name=retriever

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE}
spring.data.mongodb.authentication-database=${MONGODB_AUTH_DB}
spring.data.mongodb.username=${MONGODB_USERNAME}
spring.data.mongodb.password=${MONGODB_PASSWORD}

# Neo4j
spring.neo4j.uri=${NEO4J_URI}
spring.neo4j.authentication.username=${NEO4J_USERNAME}
spring.neo4j.authentication.password=${NEO4J_PASSWORD}

# redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# jwt
jwt.secret=${JWT_SECRET}
jwt.access-token-expire-time=${JWT_ACCESS_TOKEN_EXPIRE_TIME}
jwt.refresh-token-expire-time=${JWT_REFRESH_TOKEN_EXPIRE_TIME}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Flask
flask.url=${FLASK_URL}
